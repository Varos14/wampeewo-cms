services:
  mysql:
    image: mysql:8.0
    container_name: competency_cms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-competency_cms}
      MYSQL_USER: ${DB_USER:-competency_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-competency_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: competency_cms_phpmyadmin
    depends_on:
      - mysql
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}

volumes:
  mysql_data:
